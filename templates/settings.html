{% extends "base.html" %}
{% block content %}

<style>
    .card {
        max-width: 500px;
        margin: 30px auto;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
        margin-top: 15px;
        display: block;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
    }

    button {
        background: #003366;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 6px;
        width: 100%;
        margin-top: 25px;
        font-size: 16px;
        font-weight: bold;
    }

    button:hover {
        background: #0055aa;
    }
</style>

<div class="card">
    <h2>⚙️ Configuración</h2>

    <form action="/settings" method="POST">

        <label>Precio por hora:</label>
        <input type="number" step="0.01" name="precio_hora" value="{{ settings.precio_hora }}" required>

        <label>Porcentaje de comisión (%):</label>
        <input type="number" step="0.1" name="comision" value="{{ settings.comision * 100 }}" required>

        <button type="submit">💾 Guardar cambios</button>
    </form>
</div>

{% endblock %}
