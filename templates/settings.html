<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Configuración</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 420px;
            margin: 30px auto;
            background: white;
            border: 1px solid #ccc;
            padding: 20px;
        }
        h2 {
            margin-top: 0;
            font-size: 22px;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 5px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #777;
            background: #fff;
            font-size: 16px;
        }
        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: #a74caf;
            color: rgb(225, 247, 27);
            border: none;
            font-size: 18px;
            text-transform: uppercase;
        }
        a {
            text-decoration: none;
        }
        .back {
            margin-top: 15px;
            display: block;
            text-align: center;
            color: #333333;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Configuración</h2>
    <form method="POST">
        <label>Precio por hora</label>
        <input type="number" step="0.01" name="precio_hora" value="{{ settings.precio_hora }}" required>

        <label>Porcentaje de comisión</label>
        <!-- MOSTRAR 2 EN VEZ DE 0.02 -->
        <input type="number" step="0.01" name="comision" value="{{ settings.comision * 100 }}" required>

        <button type="submit">Guardar</button>
    </form>
    <a href="/" class="back">← Volver</a>
</div>
</body>
</html>
