{% extends "base.html" %}
{% block content %}

<div class="settings-container">
    <h2>Configuración</h2>

    <form method="POST">
        <label>Precio por hora</label>
        <input type="number" step="0.01" name="precio_hora" value="{{ settings.precio_hora }}" required>

        <label>Porcentaje de comisión</label>
        <input type="number" step="0.01" name="comision" value="{{ settings.comision * 100 }}" required>

        <button type="submit">Guardar</button>
    </form>

    <a href="/" class="back">← Volver</a>
</div>

{% endblock %}
