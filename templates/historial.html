<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Historial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 420px;
            margin: 30px auto;
            background: white;
            border: 1px solid #ccc;
            padding: 20px;
        }
        h2 {
            margin-top: 0;
            font-size: 22px;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 5px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        a {
            text-decoration: none;
            color: #4CAF50;
            font-size: 18px;
        }
        .delete-btn {
            background: none;
            border: none;
            color: red;
            font-size: 16px;
            cursor: pointer;
        }
        .back {
            margin-top: 20px;
            display: block;
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Historial de Reportes</h2>

    {% if reportes %}
        <ul>
            {% for r in reportes %}
            <li>
                <a href="/reporte/{{ r[0] }}">
                    {{ r[1] }} — ${{ "%.2f"|format(r[2]) }}
                </a>

                <!-- BOTÓN BORRAR -->
                <form action="/borrar/{{ r[0] }}" method="POST" style="margin:0;">
                    <button class="delete-btn" onclick="return confirm('¿Eliminar este reporte?')">
                        ✖
                    </button>
                </form>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p style="color:#555; font-size:18px; text-align:center; margin-top:40px;">
            Aún no hay reportes guardados.
        </p>
    {% endif %}

    <a href="/" class="back">← Volver</a>
</div>

</body>
</html>
