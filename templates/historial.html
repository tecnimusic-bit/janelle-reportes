{% extends "base.html" %}
{% block content %}

<div class="historial-container">
    <h2 style="text-align:center; margin-bottom:20px;">📚 Historial de Reportes</h2>

    {% if reportes %}
        <ul style="list-style:none; padding:0; margin:0;">
            {% for r in reportes %}
            <li style="
                display:flex;
                justify-content:space-between;
                align-items:center;
                padding:12px 0;
                border-bottom:1px solid #eee;
            ">

                <!-- ENLACE AL REPORTE -->
                <a href="/reporte/{{ r[0] }}" style="color:#333; text-decoration:none; font-size:16px;">
                    {{ r[1] }} — ${{ "%.2f"|format(r[2]) }}
                </a>

                <!-- BOTÓN DE BORRAR -->
                <form action="/borrar/{{ r[0] }}" method="POST" style="margin:0;">
                    <button class="delete-btn" onclick="return confirm('¿Eliminar este reporte?')">✖</button>
                </form>

            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p style="color:#555; font-size:18px; text-align:center; margin-top:40px;">
            Aún no hay reportes guardados.
        </p>
    {% endif %}

    <a href="/" class="back" style="display:block; margin-top:25px; text-align:center; color:#4a6fa5;">
        ← Volver
    </a>
</div>

{% endblock %}
