{% extends "base.html" %}
{% block content %}

<div class="historial-container">
    <h2>Historial de Reportes</h2>

    {% if reportes %}
        <ul>
            {% for r in reportes %}
            <li>
                <a href="/reporte/{{ r[0] }}">
                    {{ r[1] }} — ${{ "%.2f"|format(r[2]) }}
                </a>

                <form action="/borrar/{{ r[0] }}" method="POST" style="margin:0;">
                    <button class="delete-btn" onclick="return confirm('¿Eliminar este reporte?')">
                        ✖
                    </button>
                </form>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p style="color:#555; font-size:18px; text-align:center; margin-top:40px;">
            Aún no hay reportes guardados.
        </p>
    {% endif %}

    <a href="/" class="back">← Volver</a>
</div>

{% endblock %}
